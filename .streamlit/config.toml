[theme]
base = "dark"
primaryColor = "#3DDC97"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#171B22"
textColor = "#F5F7FA"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true

[runner]
fastReruns = true
